<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>404 — Page Not Found | AeroWebAI</title>
  <meta name="robots" content="noindex" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:#f8f9fa;
      color:#202124;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .card{
      width:min(720px, 100%);
      background:#fff;
      border:1px solid #e6e8ee;
      border-radius:18px;
      padding:28px;
      box-shadow:0 10px 30px rgba(0,0,0,.06);
    }
    .badge{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      background:#f1f3f4;
      border:1px solid #e6e8ee;
      font-size:12px;
      margin-bottom:12px;
    }
    h1{font-size:34px;line-height:1.2;margin-bottom:10px}
    p{color:#5f6368;line-height:1.6;margin-bottom:18px}
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    a.btn{
      display:inline-flex;align-items:center;justify-content:center;
      padding:12px 14px;border-radius:12px;
      text-decoration:none;font-weight:600;
      border:1px solid #dadce0;
      color:#202124;background:#fff;
    }
    a.primary{background:#1a73e8;color:#fff;border-color:#1a73e8}
    .links{margin-top:18px;display:flex;gap:10px;flex-wrap:wrap}
    .links a{color:#1a73e8;text-decoration:none;font-weight:600}
    .links a:hover{text-decoration:underline}
    @media (max-width:420px){ h1{font-size:28px} .card{padding:20px} }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">404 • Page not found</div>
    <h1>Oops! This link doesn’t exist.</h1>
    <p>
      The page you’re trying to open may have moved, been deleted, or the URL is typed wrong.
      Use the buttons below to go back to safety.
    </p>

    <div class="actions">
      <a class="btn primary" href="/">Go Home</a>
      <a class="btn" href="/pdf-maker/">PDF Tools</a>
      <a class="btn" href="/image-compressor/">Image Tools</a>
    </div>

    <div class="links">
      <a href="/merge-pdf/">Merge PDF</a>
      <a href="/compress-pdf/">Compress PDF</a>
      <a href="/image-to-pdf/">Image to PDF</a>
    </div>
  </main>
</body>
</html>
